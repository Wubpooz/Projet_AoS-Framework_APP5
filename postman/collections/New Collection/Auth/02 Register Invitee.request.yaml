$kind: http-request
name: '02 Register Invitee'
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{inviteeEmail}}",
      "password": "{{inviteePassword}}",
      "name": "Invitee User"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', () => {
        pm.expect(pm.response.code).to.equal(200);
      });
      
      pm.test('Response is JSON', () => {
        pm.response.to.have.header('Content-Type', /application\/json/);
      });
      
      // Save invitee user data
      const json = pm.response.json();
      if (json.user?.id) {
        pm.collectionVariables.set('inviteeUserId', json.user.id);
        console.log('Saved inviteeUserId:', json.user.id);
      }
      if (json.sessionToken) {
        pm.collectionVariables.set('inviteeToken', json.sessionToken);
        console.log('Saved inviteeToken from registration');
      }