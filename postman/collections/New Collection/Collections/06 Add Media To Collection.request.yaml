$kind: http-request
name: '06 Add Media To Collection'
method: POST
url: '{{baseUrl}}/api/collections/{{collectionId}}/media'
order: 7000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "mediaId": "{{mediaId}}",
      "position": 0
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 201', () => {
        pm.expect(pm.response.code).to.equal(201);
      });

      // Save collection media ID for later operations
      const jsonData = pm.response.json();
      if (jsonData.id) {
        pm.collectionVariables.set('collectionMediaId', jsonData.id);
        console.log('Saved collectionMediaId:', jsonData.id);
      }
