$kind: http-request
name: '18 Get Collection By Id As Removed Invitee'
method: GET
url: '{{baseUrl}}/api/collections/{{collectionId}}'
order: 19000
description: Verify that a removed invitee can no longer access the private collection
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{inviteeToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 404', () => {
        pm.expect(pm.response.code).to.equal(404);
      });
