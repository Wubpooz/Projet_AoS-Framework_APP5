$kind: http-request
name: '09 Invite Member To Collection'
method: POST
url: '{{baseUrl}}/api/collections/{{collectionId}}/members'
order: 9000
description: Invite the invitee user to the collection as a collaborator
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "userId": "{{inviteeUserId}}",
      "role": "COLLABORATOR"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 201', () => {
        pm.expect(pm.response.code).to.equal(201);
      });
      
      // Save member ID for later operations
      const jsonData = pm.response.json();
      if (jsonData.id) {
        pm.collectionVariables.set('memberId', jsonData.id);
        console.log('Saved memberId:', jsonData.id);
      }
