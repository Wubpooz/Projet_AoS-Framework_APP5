$kind: http-request
name: '01 Create Collection'
method: POST
url: '{{baseUrl}}/api/collections'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Test Collection",
      "description": "A test collection for API testing",
      "tags": ["test", "api"],
      "visibility": "PRIVATE"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 201', () => {
        pm.expect(pm.response.code).to.equal(201);
      });
      
      // Save collection ID for later use
      const jsonData = pm.response.json();
      if (jsonData.id) {
        pm.collectionVariables.set('collectionId', jsonData.id);
        console.log('Saved collectionId:', jsonData.id);
      }
