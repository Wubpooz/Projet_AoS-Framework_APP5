$kind: http-request
name: '07 Accept Invitation'
method: POST
url: '{{baseUrl}}/api/collections/{{collectionId}}/invitations/respond'
order: 7000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{inviteeToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "accept": true
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', () => {
        pm.expect(pm.response.code).to.equal(200);
      });
      
      const jsonData = pm.response.json();
      pm.expect(jsonData.accepted).to.equal(true);