$kind: http-request
name: '11 Verify Invitee Removed'
method: GET
url: '{{baseUrl}}/api/collections/{{collectionId}}/members'
order: 11000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{ownerToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', () => {
        pm.expect(pm.response.code).to.equal(200);
      });
      
      const jsonData = pm.response.json();
      const memberId = pm.collectionVariables.get('memberId');
      pm.expect(jsonData.some((member) => member.id === memberId)).to.equal(false);