$kind: http-request
name: '10 List Members As Owner'
method: GET
url: '{{baseUrl}}/api/collections/{{collectionId}}/members'
order: 10000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{ownerToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', () => {
        pm.expect(pm.response.code).to.equal(200);
      });
      
      const jsonData = pm.response.json();
      const inviteeId = pm.collectionVariables.get('inviteeUserId');
      pm.expect(jsonData.some((member) => (member.userId === inviteeId || member.user?.id === inviteeId) && member.accepted === true)).to.equal(true);